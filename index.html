<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testaruda - Oposiciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #4F46E5; --primary-hover: #4338CA; --bg-color: #F9FAFB;
            --card-bg: #FFFFFF; --text-main: #111827; --text-muted: #6B7280;
            --success: #10B981; --danger: #EF4444; --border: #E5E7EB;
            --radius: 12px; --font: 'Inter', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; padding: 20px; line-height: 1.5; }
        #app { width: 100%; max-width: 800px; position: relative; }
        .screen { display: none; animation: fadeIn 0.3s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); }
        h1, h2, h3 { font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; justify-content: center; transition: 0.2s; }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-outline { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
        .btn-sm { padding: 8px 16px; font-size: 14px; }
        .option-btn { display: block; width: 100%; text-align: left; padding: 14px 18px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg); cursor: pointer; font-size: 15px; }
        .option-btn.selected { background: #E0E7FF; border-color: var(--primary); color: var(--primary-hover); font-weight: 600; border-width: 2px; }
        .option-btn.correct { background: #D1FAE5; border-color: var(--success); color: #065F46; font-weight: 600; }
        .option-btn.wrong { background: #FEE2E2; border-color: var(--danger); color: #991B1B; }
        .theme-group { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .theme-header { background: #F3F4F6; padding: 14px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; }
        .csv-list { padding: 14px; display: none; flex-direction: column; gap: 10px; background: white; }
        .csv-item { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
        .history-item:hover { background: #F9FAFB; }
        .score-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        .review-q { margin-bottom: 30px; page-break-inside: avoid; }
        .r-option { padding: 8px 12px; border-radius: 6px; margin: 4px 0; font-size: 14px; border: 1px solid transparent; }
        .r-correct { background: #D1FAE5; border-color: var(--success); }
        .r-wrong { background: #FEE2E2; border-color: var(--danger); }
    </style>
</head>
<body>
    <div id="app">
        <div id="screen-home" class="screen active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h1 style="color: var(--primary); margin:0;"><i data-lucide="brain"></i> Testaruda</h1>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-outline btn-sm" onclick="showScreen('screen-history')"><i data-lucide="bar-chart-2"></i></button>
                    <button class="btn btn-outline btn-sm" onclick="showScreen('screen-settings')"><i data-lucide="settings"></i></button>
                </div>
            </div>
            <div class="card" style="border-left: 5px solid var(--primary);">
                <h3 style="color: var(--primary);"><i data-lucide="zap"></i> Calentamiento</h3>
                <p id="random-question-text" style="margin-bottom: 15px; font-style: italic; color: var(--text-muted);">Cargando...</p>
                <div id="random-options"></div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                    <p id="random-feedback" style="display:none; font-weight: 600; font-size: 14px;"></p>
                    <button id="btn-next-random" class="btn btn-sm btn-outline" style="display:none;" onclick="loadMinigame()">Siguiente <i data-lucide="arrow-right"></i></button>
                </div>
            </div>
            <div class="card" style="text-align: center; padding: 40px 20px;">
                <h2>¿Preparado para estudiar?</h2>
                <button class="btn" style="width: 100%; margin-top: 20px;" onclick="openSetup()">Configurar Test <i data-lucide="play-circle"></i></button>
            </div>
        </div>

        <div id="screen-setup" class="screen">
            <h2><i data-lucide="sliders"></i> Temas</h2>
            <div id="themes-container"></div>
            <div class="card" style="margin-top: 20px;">
                <label>Nº preguntas (0=todas)</label>
                <input type="number" id="num-questions" value="20" style="width:100%; padding:10px; margin-top:5px;">
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button class="btn btn-outline" onclick="showScreen('screen-home')" style="flex:1;">Volver</button>
                    <button class="btn" onclick="startTest()" style="flex:2;">Empezar</button>
                </div>
            </div>
        </div>

        <div id="screen-test" class="screen">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 600;">
                <div id="test-progress">Pregunta --</div>
                <div id="test-timer" style="color: var(--danger);"><i data-lucide="clock"></i> 00:00</div>
            </div>
            <div class="card"><h2 id="question-text" style="font-size: 18px;"></h2><div id="test-options" style="margin-top: 20px;"></div></div>
            <div style="display: flex; justify-content: space-between;">
                <button class="btn btn-outline" onclick="abandonTest()">Salir</button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-outline" id="btn-prev" onclick="prevQuestion()" style="display: none;"><i data-lucide="chevron-left"></i></button>
                    <button class="btn" id="btn-next" onclick="nextQuestion()" disabled>Siguiente</button>
                </div>
            </div>
        </div>

        <div id="screen-results" class="screen">
            <div class="card" style="text-align: center;">
                <h2 id="result-score" style="font-size: 48px; color: var(--primary); margin: 20px 0;">0/0</h2>
                <p id="result-stats" style="margin-bottom: 20px;"></p>
                <button class="btn btn-outline" style="width: 100%; margin-bottom: 10px;" onclick="showReviewFromCurrent()">Revisar Test <i data-lucide="search"></i></button>
                <button class="btn" style="width: 100%;" onclick="showScreen('screen-home')">Inicio</button>
            </div>
        </div>

        <div id="screen-review" class="screen">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2>Revisión</h2>
                <button class="btn btn-sm btn-outline" onclick="exportToPDF()">PDF <i data-lucide="download"></i></button>
            </div>
            <div id="pdf-content" class="card"><div id="review-container"></div></div>
            <button class="btn" style="width: 100%;" onclick="closeReview()">Cerrar</button>
        </div>

        <div id="screen-history" class="screen">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2>Historial</h2>
                <button class="btn btn-sm btn-outline" onclick="showScreen('screen-home')">Volver</button>
            </div>
            <div class="card" id="history-container" style="padding:0;"></div>
        </div>

        <div id="screen-settings" class="screen">
            <h2>Ajustes</h2>
            <div class="card">
                <label>Modo de corrección</label>
                <select id="set-correction" style="width:100%; padding:10px; margin-bottom:15px;">
                    <option value="instant">Al instante</option>
                    <option value="end">Al finalizar</option>
                </select>
                <label>Segundos por pregunta</label>
                <input type="number" id="set-time" value="60" style="width:100%; padding:10px;">
                <button class="btn" style="width: 100%; margin-top: 20px;" onclick="saveSettings()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = { owner: 'Larafuzas', repo: 'Testaruda', path: 'Preguntas' };
        let appSettings = JSON.parse(localStorage.getItem('testaruda_settings')) || { timePerQuestion: 60, correctionMode: 'instant' };
        let activityLog = JSON.parse(localStorage.getItem('testaruda_log')) || [];
        let currentTest = { questions: [], currentIndex: 0, correctAnswers: 0, timer: null, questionsData: [] };
        let randomPool = [];

        window.onload = () => { lucide.createIcons(); loadSettingsUI(); syncMinigame(); };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-history') renderHistory();
            lucide.createIcons();
        }

        async function syncMinigame() {
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`);
                const folders = await res.json();
                const folder = folders.filter(f => f.type === 'dir')[0];
                const resF = await fetch(folder.url);
                const files = await resF.json();
                const resC = await fetch(files[0].download_url);
                const text = await resC.text();
                randomPool = Papa.parse(text, { header: true, skipEmptyLines: true }).data;
                loadMinigame();
            } catch (e) { document.getElementById('random-question-text').innerText = "Error conexión."; }
        }

        function loadMinigame() {
            const q = randomPool[Math.floor(Math.random() * randomPool.length)];
            document.getElementById('random-question-text').innerText = q.pregunta;
            document.getElementById('random-feedback').style.display = 'none';
            document.getElementById('btn-next-random').style.display = 'none';
            const opts = document.getElementById('random-options');
            opts.innerHTML = '';
            ['a','b','c','d'].forEach(l => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerText = `${l.toUpperCase()}) ${q[l]}`;
                btn.style.pointerEvents = 'auto'; // Reset de bloqueo
                btn.onclick = () => {
                    document.querySelectorAll('#random-options .option-btn').forEach(b => b.style.pointerEvents = 'none');
                    if(l.toUpperCase() === q.correcta) { btn.classList.add('correct'); document.getElementById('random-feedback').innerText = "¡Correcto! ✅"; }
                    else { btn.classList.add('wrong'); document.getElementById('random-feedback').innerText = `Era ${q.correcta} ❌`; }
                    document.getElementById('random-feedback').style.display = 'block';
                    document.getElementById('btn-next-random').style.display = 'inline-flex';
                };
                opts.appendChild(btn);
            });
        }

        async function startTest() {
            const checks = Array.from(document.querySelectorAll('.csv-check:checked'));
            if(checks.length === 0) return alert("Selecciona un tema.");
            currentTest.questions = [];
            for(let c of checks) {
                const r = await fetch(c.dataset.url);
                const t = await r.text();
                currentTest.questions.push(...Papa.parse(t, { header: true, skipEmptyLines: true }).data);
            }
            currentTest.questions.sort(() => Math.random() - 0.5);
            const lim = parseInt(document.getElementById('num-questions').value);
            if(lim > 0) currentTest.questions = currentTest.questions.slice(0, lim);
            currentTest.questions.forEach(q => q.userAnswer = null);
            currentTest.currentIndex = 0; currentTest.correctAnswers = 0;
            startTimer(currentTest.questions.length * appSettings.timePerQuestion);
            renderQuestion(); showScreen('screen-test');
        }

        function renderQuestion() {
            const q = currentTest.questions[currentTest.currentIndex];
            const isEnd = appSettings.correctionMode === 'end';
            document.getElementById('test-progress').innerText = `Pregunta ${currentTest.currentIndex + 1} de ${currentTest.questions.length}`;
            document.getElementById('question-text').innerText = q.pregunta;
            document.getElementById('btn-prev').style.display = (isEnd && currentTest.currentIndex > 0) ? 'inline-flex' : 'none';
            document.getElementById('btn-next').innerText = (currentTest.currentIndex === currentTest.questions.length -1) ? 'Finalizar' : 'Siguiente';
            const opts = document.getElementById('test-options'); opts.innerHTML = '';
            ['a','b','c','d'].forEach(l => {
                const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = `${l.toUpperCase()}) ${q[l]}`;
                if(q.userAnswer === l.toUpperCase()) btn.classList.add(isEnd ? 'selected' : (q.userAnswer === q.correcta ? 'correct' : 'wrong'));
                if(!isEnd && q.userAnswer && l.toUpperCase() === q.correcta) btn.classList.add('correct');
                if(!q.userAnswer) btn.onclick = () => {
                    q.userAnswer = l.toUpperCase();
                    if(appSettings.correctionMode === 'instant') {
                        if(l.toUpperCase() === q.correcta) { btn.classList.add('correct'); currentTest.correctAnswers++; }
                        else { btn.classList.add('wrong'); }
                    }
                    renderQuestion();
                };
                opts.appendChild(btn);
            });
            document.getElementById('btn-next').disabled = !q.userAnswer;
        }

        function nextQuestion() { (currentTest.currentIndex < currentTest.questions.length - 1) ? (currentTest.currentIndex++, renderQuestion()) : finishTest(); }
        function prevQuestion() { if(currentTest.currentIndex > 0) { currentTest.currentIndex--; renderQuestion(); } }

        function finishTest() {
            clearInterval(currentTest.timer);
            if(appSettings.correctionMode === 'end') currentTest.correctAnswers = currentTest.questions.filter(q => q.userAnswer === q.correcta).length;
            const log = { date: new Date().toLocaleString(), score: currentTest.correctAnswers, total: currentTest.questions.length, time: document.getElementById('test-timer').innerText, questions: [...currentTest.questions] };
            activityLog.push(log); localStorage.setItem('testaruda_log', JSON.stringify(activityLog));
            document.getElementById('result-score').innerText = `${currentTest.correctAnswers} / ${currentTest.questions.length}`;
            showScreen('screen-results');
        }

        function showReviewFromCurrent() { renderReview(currentTest.questions); showScreen('screen-review'); }

        function renderHistory() {
            const c = document.getElementById('history-container');
            if(activityLog.length === 0) return c.innerHTML = '<p style="padding:20px;">Vacio.</p>';
            c.innerHTML = activityLog.slice().reverse().map((e, i) => `
                <div class="history-item" onclick="viewPastTest(${activityLog.length - 1 - i})">
                    <div><b>${e.date}</b><br><small>${e.time}</small></div>
                    <div class="score-badge">${e.score}/${e.total}</div>
                </div>`).join('');
        }

        function viewPastTest(index) {
            const test = activityLog[index];
            if(test.questions) { renderReview(test.questions); showScreen('screen-review'); }
            else alert("Este test antiguo no tiene datos de revisión.");
        }

        function renderReview(qs) {
            const c = document.getElementById('review-container'); c.innerHTML = '';
            qs.forEach((q, i) => {
                const d = document.createElement('div'); d.className = 'review-q';
                d.innerHTML = `<p><b>${i+1}. ${q.pregunta}</b></p>` + ['a','b','c','d'].map(l => `
                    <div class="r-option ${q.correcta === l.toUpperCase() ? 'r-correct' : (q.userAnswer === l.toUpperCase() ? 'r-wrong' : '')}">
                    ${l.toUpperCase()}) ${q[l]} ${q.userAnswer === l.toUpperCase() ? '<b>(Tu respuesta)</b>' : ''}</div>`).join('');
                c.appendChild(d);
            });
        }

        function closeReview() { (document.getElementById('screen-results').classList.contains('active')) ? showScreen('screen-results') : showScreen('screen-history'); }
        async function openSetup() {
            showScreen('screen-setup');
            const c = document.getElementById('themes-container');
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`);
            const folders = await res.json();
            c.innerHTML = folders.filter(f => f.type === 'dir').map(f => `<div class="theme-group"><div class="theme-header">${f.name}</div><div class="csv-list" style="display:flex;"><label><input type="checkbox" class="csv-check" data-url="https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/Preguntas/${f.name}/Cuestiones_generales.csv"> Cuestiones</label></div></div>`).join('');
        }
        function startTimer(s) { let r = s; currentTest.timer = setInterval(() => { r--; const m = Math.floor(r/60).toString().padStart(2,'0'), sc = (r%60).toString().padStart(2,'0'); document.getElementById('test-timer').innerHTML = `<i data-lucide="clock"></i> ${m}:${sc}`; if(r<=0) finishTest(); }, 1000); }
        function saveSettings() { appSettings.correctionMode = document.getElementById('set-correction').value; appSettings.timePerQuestion = parseInt(document.getElementById('set-time').value); localStorage.setItem('testaruda_settings', JSON.stringify(appSettings)); showScreen('screen-home'); }
        function loadSettingsUI() { document.getElementById('set-correction').value = appSettings.correctionMode; document.getElementById('set-time').value = appSettings.timePerQuestion; }
        function abandonTest() { if(confirm("¿Salir?")) { clearInterval(currentTest.timer); showScreen('screen-home'); } }
        function exportToPDF() { html2pdf().set({margin:10, filename:'Revision.pdf'}).from(document.getElementById('pdf-content')).save(); }
    </script>
</body>
</html>
